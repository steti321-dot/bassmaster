name: Deploy web build to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  # Opt into Node.js 24 now so the runner doesn't print deprecation
  # warnings for actions/checkout / setup-node (default Node version
  # for actions changes 2026-06-02).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        # `--ignore-scripts` skips the postinstall yt-dlp setup — that script
        # downloads a Windows binary we don't need in the web bundle
        # (Audio-to-Notes tab is excluded from REACT_APP_BUILD_TARGET=web).
        # We dropped `--legacy-peer-deps` after the Vite migration; the modern
        # peer-dep tree resolves cleanly on its own.
        run: npm ci --ignore-scripts

      - name: Build web bundle
        env:
          REACT_APP_PROXY_BASE: ${{ secrets.PROXY_BASE_URL }}
        # `build:web` sets REACT_APP_BUILD_TARGET=web and runs `vite build`.
        # vite.config.ts then derives base = '/bassmaster/' for GH Pages.
        run: npm run build:web

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
